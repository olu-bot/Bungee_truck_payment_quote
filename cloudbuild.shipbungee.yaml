# Build image for https://shipbungee.com/ + https://shipbungee.com/connect/
# Frontend assets use base path /connect/
#
# After push, deploy to Cloud Run with runtime env:
#   SERVE_UNIFIED_SITE=true
#   PUBLIC_APP_URL=https://shipbungee.com
#   CONNECT_PUBLIC_PATH=connect
# Plus existing Stripe, Firebase, Maps keys, etc.
substitutions:
  _VITE_BASE_PATH: "/connect/"
  _VITE_CONNECT_GUEST_MODE: "true"
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--tag"
      - "${_IMAGE_URI}"
      - "--build-arg"
      - "VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}"
      - "--build-arg"
      - "VITE_BASE_PATH=${_VITE_BASE_PATH}"
      - "--build-arg"
      - "VITE_CONNECT_GUEST_MODE=${_VITE_CONNECT_GUEST_MODE}"
      - "."
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "${_IMAGE_URI}"
images:
  - "${_IMAGE_URI}"
