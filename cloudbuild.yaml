# Production URL: https://bungee-connect-643512829867.us-central1.run.app
# On Cloud Run, set env PUBLIC_APP_URL=https://bungee-connect-643512829867.us-central1.run.app (no trailing slash for Stripe).
steps:
  # Build the full app container (React build + Express bundle)
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--tag"
      - "${_IMAGE_URI}"
      - "--build-arg"
      - "VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}"
      - "--build-arg"
      - "VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}"
      - "."

  # Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "${_IMAGE_URI}"

images:
  - "${_IMAGE_URI}"

